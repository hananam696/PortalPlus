<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Campus Map Coordinate Picker</title>

<style>

body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
}

#container{
position:relative;
display:inline-block;
margin-top:20px;
}

#map{
max-width:1100px;
cursor:crosshair;
}

#marker{
position:absolute;
width:12px;
height:12px;
background:red;
border-radius:50%;
transform:translate(-50%,-50%);
pointer-events:none;
}

#output{
margin-top:20px;
font-size:18px;
}

</style>

</head>

<body>

<h2>Click on the campus map to get coordinates</h2>

<div id="container">

<img id="map" src="../public/campus/campus-map.png">

<div id="marker"></div>

</div>

<div id="output">
top:0 left:0
</div>

<script>

const map = document.getElementById("map")
const marker = document.getElementById("marker")
const output = document.getElementById("output")

map.addEventListener("click",function(e){

const rect = map.getBoundingClientRect()

const x = e.clientX - rect.left
const y = e.clientY - rect.top

const left = (x / rect.width) * 100
const top = (y / rect.height) * 100

marker.style.left = x + "px"
marker.style.top = y + "px"

const result = `coordinates:{top:${top.toFixed(2)},left:${left.toFixed(2)}}`

output.innerText = result

console.log(result)

})

</script>

</body>
</html>
